target-version = "py311"
extend-exclude = [
  ".worktrees",
  ".agents/data/vendor",
  "Program",
  "local-cortex/console/spa/dist",
]

[lint]
select = ["E4", "E7", "E9", "F"]
ignore = ["E402", "E701", "E702", "E731"]

[lint.per-file-ignores]
"**/tests/**/*.py" = ["F401", "F541", "F841"]
".agents/tests/**/*.py" = ["F401", "F541", "F841"]
"scripts/fitness/tests/**/*.py" = ["F401", "F541", "F841"]
