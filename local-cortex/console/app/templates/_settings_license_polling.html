<form class="polling-container"
      hx-post="/settings/license/login/poll"
      hx-trigger="every {{ interval|int }}s"
      hx-target="#login-container"
      hx-swap="innerHTML">
    <input type="hidden" name="device_code" value="{{ device_code }}">
    <input type="hidden" name="code_verifier" value="{{ code_verifier }}">
    <input type="hidden" name="user_code" value="{{ user_code }}">
    <input type="hidden" name="verification_uri" value="{{ verification_uri }}">
    <input type="hidden" name="interval" value="{{ interval|int }}">
    <p>Please open <strong><a href="{{ verification_uri }}" target="_blank">{{ verification_uri }}</a></strong> and enter the code:</p>
    <h2 class="user-code">{{ user_code }}</h2>
    <p>Waiting for authorization...</p>
</form>
